services:
  # Web Service
  - type: web
    name: smartseason-api
    runtime: node
    plan: free
    buildCommand: "npm install && npx prisma generate"
    startCommand: "npm start"
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3000
      - key: DATABASE_URL
        fromDatabase:
          name: smartseason-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true

databases:
  - name: smartseason-db
    plan: free
